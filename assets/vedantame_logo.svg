    <!-- Two interlocking triangles (Star of David / Shatkona — símbolo do Vedanta) -->
    <!-- Triângulo apontando para cima -->
    <polygon points="0,-28 24,14 -24,14" fill="none" stroke="#1A1A2E" stroke-width="2.5" opacity="0.85" style="fill:none;stroke:rgb(26, 26, 46);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <!-- Triângulo apontando para baixo -->
    <polygon points="0,28 24,-14 -24,-14" fill="none" stroke="#8B5C2A" stroke-width="2.5" opacity="0.85" style="fill:none;stroke:rgb(139, 92, 42);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.85;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>


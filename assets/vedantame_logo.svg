  <!-- Nome principal -->
  <text x="340" y="268" text-anchor="middle" style="fill:rgb(245, 240, 232);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:52px;font-weight:700;text-anchor:middle;dominant-baseline:auto">VedantaMe</text>

  <!-- Subtítulo -->
  <text x="340" y="298" text-anchor="middle" style="fill:rgb(196, 129, 58);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Georgia, serif;font-size:16px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">Rede de Apoio Mútuo</text>


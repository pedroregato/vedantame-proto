  <text x="340" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#4A4A6A" opacity="0.6" style="fill:rgb(74, 74, 106);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.6;font-family:Arial, sans-serif;font-size:10px;font-weight:400;text-anchor:middle;dominant-baseline:auto">·</text>
  <text x="440" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-style="italic" fill="#8B5C2A" opacity="0.8" style="fill:rgb(139, 92, 42);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.8;font-family:Georgia, serif;font-size:11px;font-weight:400;font-style:italic;text-anchor:middle;dominant-baseline:auto">sanga</text>

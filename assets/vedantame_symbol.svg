<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="100%">
  <defs>
    <style>
      .petals-outer { transform-origin: 140px 140px; animation: spin-cw  18s linear infinite; }
      .petals-inner { transform-origin: 140px 140px; animation: spin-ccw 12s linear infinite; }
      .om-pulse     { transform-origin: 140px 140px; animation: pulse     3s ease-in-out infinite; }
      @keyframes spin-cw  { from { transform: rotate(0deg);   } to { transform: rotate(360deg);  } }
      @keyframes spin-ccw { from { transform: rotate(0deg);   } to { transform: rotate(-360deg); } }
      @keyframes pulse {
        0%, 100% { opacity: 1;    transform: scale(1);    }
        50%      { opacity: 0.72; transform: scale(0.94); }
      }
    </style>
  </defs>

  <!-- Pétalas externas — rotação horária -->
  <g class="petals-outer">
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(0   140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(45  140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(90  140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(135 140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(180 140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(225 140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(270 140 140)"/>
    <ellipse cx="140" cy="88"  rx="13" ry="30" fill="#C4813A" opacity="0.32" transform="rotate(315 140 140)"/>
  </g>

  <!-- Pétalas internas — rotação anti-horária -->
  <g class="petals-inner">
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(22.5  140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(67.5  140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(112.5 140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(157.5 140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(202.5 140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(247.5 140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(292.5 140 140)"/>
    <ellipse cx="140" cy="104" rx="9"  ry="20" fill="#8B5C2A" opacity="0.58" transform="rotate(337.5 140 140)"/>
  </g>

  <!-- ॐ central — pulse -->
  <g class="om-pulse">
    <text x="140" y="146"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="20"
          font-weight="400"
          fill="#8B5C2A"
          opacity="0.9">ॐ</text>
  </g>

</svg>
